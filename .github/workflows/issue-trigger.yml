name: Trigger workflow on new issue

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]

jobs:
  trigger:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    if: >-
      github.event_name == 'issues' ||
      (github.event_name == 'pull_request_review' &&
       github.event.review.user.type != 'Bot' &&
       github.event.review.user.login != vars.BOT_USERNAME &&
       !contains(github.event.review.user.login, '[bot]')) ||
      (github.event_name == 'pull_request_review_comment' &&
       github.event.comment.user.type != 'Bot' &&
       github.event.comment.user.login != vars.BOT_USERNAME &&
       !contains(github.event.comment.user.login, '[bot]')) ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.state == 'open' &&
       github.event.comment.user.login != vars.BOT_USERNAME &&
       github.event.comment.user.type != 'Bot' &&
       !contains(github.event.comment.user.login, '[bot]'))
    steps:
      - name: Resolve issue number
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${{ github.event_name }}" == "pull_request_review" || \
                "${{ github.event_name }}" == "pull_request_review_comment" ]]; then
            BRANCH="${{ github.event.pull_request.head.ref }}"
            ISSUE_NUM=$(echo "$BRANCH" | grep -oP 'issue-\K\d+' || echo "")
            if [ -z "$ISSUE_NUM" ]; then
              echo "Not a plan branch ($BRANCH) — skipping"
              exit 0
            fi
          elif [[ "${{ github.event_name }}" == "issue_comment" && \
                  -n "${{ github.event.issue.pull_request.url }}" ]]; then
            # issue_comment on a PR — look up the head branch via API
            PR_NUM="${{ github.event.issue.number }}"
            BRANCH=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUM}" --jq '.head.ref')
            ISSUE_NUM=$(echo "$BRANCH" | grep -oP 'issue-\K\d+' || echo "")
            if [ -z "$ISSUE_NUM" ]; then
              echo "Not a plan branch ($BRANCH) — skipping"
              exit 0
            fi
          else
            ISSUE_NUM="${{ github.event.issue.number }}"
          fi
          echo "issue_number=$ISSUE_NUM" >> "$GITHUB_OUTPUT"

      - name: Trigger worker
        if: steps.resolve.outputs.issue_number != ''
        run: |
          curl -sf -X POST \
            "${{ secrets.WORKER_URL }}/trigger" \
            -H "Authorization: Bearer ${{ secrets.TRIGGER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"issue_number\": ${{ steps.resolve.outputs.issue_number }}, \"repo_owner\": \"${{ github.repository_owner }}\", \"repo_name\": \"${{ github.event.repository.name }}\"}"
