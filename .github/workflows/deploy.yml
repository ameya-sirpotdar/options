name: Deploy Infrastructure and Applications

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}

jobs:
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Detect changed paths
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            infra:
              - 'infra/bicep/**'
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  deploy-infra:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.infra == 'true'
    environment: production
    timeout-minutes: 60
    concurrency:
      group: deploy-infra-production
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Azure Login (OIDC)
        uses: azure/login@6c251865b4e6290e7b78be643ea2d005bc51f69a # v2.1.1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep template
        uses: azure/arm-deploy@e792c9a34eb6a018b445eff5f1a6394f0c6e1e2d # v2.0.0
        with:
          scope: subscription
          region: ${{ env.AZURE_LOCATION }}
          template: infra/bicep/main.bicep
          parameters: location=${{ env.AZURE_LOCATION }} resourceGroupName=${{ env.AZURE_RESOURCE_GROUP }}
          deploymentName: gh-${{ github.run_id }}-${{ github.run_attempt }}
          failOnStdErr: true

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: [changes, deploy-infra]
    # IMPORTANT: always() is required here. Without it, GitHub auto-skips this job
    # when deploy-infra is skipped (no infra changes). The explicit result checks
    # below provide the actual gate logic. Do NOT remove always().
    # 'cancelled' is excluded explicitly so a cancelled infra run causes a hard failure
    # rather than a silent skip.
    if: |
      always() &&
      needs.changes.outputs.backend == 'true' &&
      (needs.deploy-infra.result == 'success' || needs.deploy-infra.result == 'skipped')
    environment: production
    timeout-minutes: 30
    concurrency:
      group: deploy-backend-production
      cancel-in-progress: false
    env:
      K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE || 'production' }}
      BACKEND_DEPLOYMENT_LABEL: ${{ vars.BACKEND_DEPLOYMENT_LABEL || 'app=options-backend' }}

    steps:
      - name: Validate required secrets
        env:
          ACR_NAME: ${{ secrets.ACR_NAME }}
          AKS_CLUSTER_NAME: ${{ secrets.AKS_CLUSTER_NAME }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          KEY_VAULT_URL: ${{ secrets.KEY_VAULT_URL }}
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
        run: |
          set +x  # prevent accidental value echo via xtrace
          missing=0
          for secret in ACR_NAME AKS_CLUSTER_NAME AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID AZURE_STORAGE_CONNECTION_STRING KEY_VAULT_URL; do
            if [ -z "${!secret}" ]; then
              echo "ERROR: Required secret '$secret' is not set"
              missing=1
            fi
          done
          if [ -z "${ALLOWED_ORIGINS}" ]; then
            echo "WARN: ALLOWED_ORIGINS is not set; defaulting to empty (all origins blocked)"
          fi
          for var in AZURE_RESOURCE_GROUP AZURE_LOCATION; do
            if [ -z "${!var}" ]; then
              echo "ERROR: Required variable '$var' is not set"
              missing=1
            fi
          done
          [ $missing -eq 0 ] || exit 1

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Each job performs its own OIDC login for intentional isolation.
      # Requires a federated credential in Entra ID with subject:
      # repo:<org>/<repo>:environment:production
      - name: Azure Login (OIDC)
        uses: azure/login@6c251865b4e6290e7b78be643ea2d005bc51f69a # v2.1.1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        env:
          ACR_NAME: ${{ secrets.ACR_NAME }}
        run: az acr login --name "$ACR_NAME"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3.7.1

      - name: Build and push backend Docker image
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v5.4.0
        env:
          ACR_NAME: ${{ secrets.ACR_NAME }}
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_NAME }}.azurecr.io/backend:${{ github.sha }}
            ${{ secrets.ACR_NAME }}.azurecr.io/backend:latest
            ${{ secrets.ACR_NAME }}.azurecr.io/backend:production
          cache-from: |
            type=gha
            type=registry,ref=${{ secrets.ACR_NAME }}.azurecr.io/backend:latest
          cache-to: type=gha,mode=max

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ env.AZURE_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Substitute image tag in Kubernetes manifests
        env:
          IMAGE_TAG: ${{ github.sha }}
          ACR_NAME: ${{ secrets.ACR_NAME }}
        run: |
          # Process all YAML manifests under infra/k8s/ and substitute any placeholders
          # they contain. A manifest may have __ACR_NAME__ without __IMAGE_TAG__ (e.g. a
          # ConfigMap referencing the registry), so we iterate all files rather than
          # filtering on __IMAGE_TAG__ alone to avoid silently leaving placeholders unreplaced.
          set -euo pipefail
          mapfile -t ALL_MANIFESTS < <(find infra/k8s/ \( -name '*.yaml' -o -name '*.yml' \) -type f)
          if [ ${#ALL_MANIFESTS[@]} -eq 0 ]; then
            echo "ERROR: No YAML manifests found in infra/k8s/" && exit 1
          fi
          substituted=0
          for f in "${ALL_MANIFESTS[@]}"; do
            if grep -q '__IMAGE_TAG__\|__ACR_NAME__' "$f"; then
              grep -q '__IMAGE_TAG__' "$f" || echo "WARN: $f has __ACR_NAME__ but not __IMAGE_TAG__"
              sed -i -e "s|__IMAGE_TAG__|${IMAGE_TAG}|g" -e "s|__ACR_NAME__|${ACR_NAME}|g" "$f"
              substituted=$((substituted + 1))
            fi
          done
          if [ "$substituted" -eq 0 ]; then
            echo "ERROR: No manifests contained __IMAGE_TAG__ or __ACR_NAME__ placeholders" && exit 1
          fi

      - name: Create or update Kubernetes secret
        env:
          NAMESPACE: ${{ env.K8S_NAMESPACE }}
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          KEY_VAULT_URL: ${{ secrets.KEY_VAULT_URL }}
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}
        run: |
          set +x  # prevent secret values appearing in xtrace output
          set -euo pipefail
          # Write secret values to a chmod-600 temp file via heredoc to keep them
          # out of process argument lists (which can appear in logs or error output).
          TMPFILE=$(mktemp)
          trap 'rm -f "$TMPFILE"' EXIT
          chmod 600 "$TMPFILE"
          printf 'azure-storage-connection-string=%s\nkey-vault-url=%s\nallowed-origins=%s\n' \
            "${AZURE_STORAGE_CONNECTION_STRING}" "${KEY_VAULT_URL}" "${ALLOWED_ORIGINS}" > "$TMPFILE"
          kubectl create secret generic options-backend-secrets \
            --namespace="${NAMESPACE}" \
            --from-env-file="$TMPFILE" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Validate Kubernetes manifests (dry-run)
        # Server-side dry-run is used intentionally to exercise admission webhooks.
        # --request-timeout guards against cluster unavailability blocking the pipeline.
        env:
          NAMESPACE: ${{ env.K8S_NAMESPACE }}
        run: kubectl apply -f infra/k8s/backend/ --dry-run=server --namespace="$NAMESPACE" --request-timeout=30s

      - name: Apply Kubernetes manifests
        id: apply
        env:
          NAMESPACE: ${{ env.K8S_NAMESPACE }}
        run: kubectl apply -f infra/k8s/backend/ --server-side --namespace="$NAMESPACE"
        # --force-conflicts intentionally omitted; add back only if a specific
        # field-manager conflict is identified and understood.

      - name: Wait for rollout to complete
        id: rollout_wait
        env:
          NAMESPACE: ${{ env.K8S_NAMESPACE }}
          DEPLOY_LABEL: ${{ env.BACKEND_DEPLOYMENT_LABEL }}
          ROLLOUT_TIMEOUT: ${{ vars.ROLLOUT_TIMEOUT || '5m' }}
        run: |
          set -euo pipefail
          mapfile -t DEPLOYS < <(kubectl get deployments -n "$NAMESPACE" -l "$DEPLOY_LABEL" -o name)
          if [ ${#DEPLOYS[@]} -eq 0 ]; then
            echo "ERROR: No backend deployments found in namespace '$NAMESPACE' with label '$DEPLOY_LABEL'" && exit 1
          fi
          pids=()
          for deploy in "${DEPLOYS[@]}"; do
            kubectl rollout status "$deploy" -n "$NAMESPACE" --timeout="$ROLLOUT_TIMEOUT" &
            pids+=("$!")
          done
          failed=0
          for pid in "${pids[@]}"; do
            wait "$pid" || failed=1
          done
          [ $failed -eq 0 ] || exit 1

      - name: Rollback on failure
        if: failure() && steps.apply.conclusion == 'success' && steps.rollout_wait.conclusion == 'failure'
        env:
          NAMESPACE: ${{ env.K8S_NAMESPACE }}
          DEPLOY_LABEL: ${{ env.BACKEND_DEPLOYMENT_LABEL }}
        run: |
          set -euo pipefail
          mapfile -t DEPLOYS < <(kubectl get deployments -n "$NAMESPACE" -l "$DEPLOY_LABEL" -o name)
          for deploy in "${DEPLOYS[@]}"; do
            kubectl rollout undo "$deploy" -n "$NAMESPACE"
          done

      - name: Smoke test backend
        env:
          INGRESS_NAME: ${{ vars.BACKEND_INGRESS_NAME || 'backend' }}
        run: |
          set -euo pipefail
          # Poll status.loadBalancer.ingress[0].hostname to wait for the cloud
          # load-balancer to assign a routable address before attempting curl.
          # This restores the safety that was lost when the original polling loop
          # was removed. 12 attempts × 10 s = up to 2 minutes.
          BACKEND_URL=""
          for i in $(seq 1 12); do
            BACKEND_URL=$(kubectl get ingress "${INGRESS_NAME}" -n "${{ env.K8S_NAMESPACE }}" \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
            [ -n "$BACKEND_URL" ] && break
            echo "Waiting for ingress hostname... attempt $i/12"
            sleep 10
          done
          if [ -z "$BACKEND_URL" ]; then
            echo "ERROR: Ingress hostname not assigned after 2 minutes" && exit 1
          fi
          # Poll on actual HTTP reachability to wait for DNS propagation and TLS certificate
          # provisioning. --insecure is intentionally avoided; we poll until the cert is valid.
          # 18 attempts × 10 s = up to 3 minutes total.
          # --show-error (-S) ensures curl prints error messages to stderr even in --silent mode,
          # aiding post-failure diagnosis without adding progress noise.
          for i in $(seq 1 18); do
            curl --silent --show-error --fail --max-time 10 "https://${BACKEND_URL}/health" && break
            echo "Waiting for endpoint to become reachable... attempt $i/18"
            if [ "$i" -eq 18 ]; then
              echo "ERROR: Smoke test failed after 18 attempts" && exit 1
            fi
            sleep 10
          done

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    # deploy-backend and deploy-frontend both depend only on deploy-infra (not each other),
    # so they run in parallel once infra completes. This is intentional.
    needs: [changes, deploy-infra]
    # always() prevents GitHub from auto-skipping this job when deploy-infra is skipped
    # (e.g. no infra changes). The explicit result checks then gate on actual outcomes.
    # 'cancelled' is excluded explicitly so a cancelled infra run causes a hard failure
    # rather than a silent skip.
    if: |
      always() &&
      needs.changes.outputs.frontend == 'true' &&
      (needs.deploy-infra.result == 'success' || needs.deploy-infra.result == 'skipped') &&
      needs.deploy-infra.result != 'cancelled'
    environment: production

    steps:
      - name: Validate required secrets and variables
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_STATIC_WEB_APPS_API_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: |
          set +x  # prevent accidental value echo via xtrace
          missing=0
          for secret in AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID AZURE_STATIC_WEB_APPS_API_TOKEN; do
            if [ -z "${!secret}" ]; then
              echo "ERROR: Required secret '$secret' is not set."
              missing=1
            fi
          done
          for var in VITE_API_BASE_URL; do
            if [ -z "${!var}" ]; then
              echo "ERROR: Required variable '$var' is not set."
              missing=1
            fi
          done
          if [ $missing -ne 0 ]; then
            echo ""
            echo "One or more required GitHub secrets or variables are missing."
            echo "See docs/setup/github-secrets-setup.md for setup instructions."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/vue-app/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend/vue-app
        run: npm ci

      - name: Build Vue application
        working-directory: ./frontend/vue-app
        run: npm run build
        env:
          # VITE_API_BASE_URL is not a secret — it is a non-sensitive build-time config value.
          # It is stored as a GitHub Actions variable (vars.*) rather than a secret so it
          # is not masked in logs and its non-sensitive nature is explicit.
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      # Each job performs its own OIDC login for intentional isolation.
      - name: Azure Login (OIDC)
        uses: azure/login@6c251865b4e6290e7b78be643ea2d005bc51f69a # v2.1.1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1.5.0
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend/vue-app/dist
          output_location: ""
          skip_app_build: true
