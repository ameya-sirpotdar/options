name: Deploy Infrastructure and Applications

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AZURE_RESOURCE_GROUP: rg-production
  AZURE_LOCATION: eastus
  ACR_NAME: ${{ secrets.ACR_NAME }}
  AKS_CLUSTER_NAME: ${{ secrets.AKS_CLUSTER_NAME }}

jobs:
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            infra:
              - 'infra/bicep/**'
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  deploy-infra:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.infra == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep template
        uses: azure/arm-deploy@v2
        with:
          scope: subscription
          region: ${{ env.AZURE_LOCATION }}
          template: infra/bicep/main.bicep
          parameters: location=${{ env.AZURE_LOCATION }}
          failOnStdErr: true

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: [changes, deploy-infra]
    if: |
      always() &&
      needs.changes.outputs.backend == 'true' &&
      (needs.deploy-infra.result == 'success' || needs.deploy-infra.result == 'skipped')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Each job performs its own OIDC login for intentional isolation.
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_NAME }}.azurecr.io/backend:${{ github.sha }}
            ${{ env.ACR_NAME }}.azurecr.io/backend:main
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.AZURE_RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER_NAME }}

      - name: Substitute image tag in Kubernetes manifests
        env:
          IMAGE_TAG: ${{ github.sha }}
          ACR_NAME: ${{ env.ACR_NAME }}
        run: |
          # Capture file list once to ensure atomicity across both checks and substitution
          MANIFESTS=$(find infra/k8s -name '*.yaml' -o -name '*.yml')
          echo "$MANIFESTS" | xargs grep -l 'IMAGE_TAG\|ACR_NAME' || \
            (echo "ERROR: No placeholders found in manifests" && exit 1)
          echo "$MANIFESTS" | xargs sed -i \
            -e "s|IMAGE_TAG|${IMAGE_TAG}|g" \
            -e "s|ACR_NAME|${ACR_NAME}|g"

      - name: Validate Kubernetes manifests (dry-run)
        run: kubectl apply -f infra/k8s/ --dry-run=server

      - name: Apply Kubernetes manifests
        run: kubectl apply -f infra/k8s/ --server-side

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/backend -n default --timeout=5m

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [changes, deploy-infra]
    if: |
      always() &&
      needs.changes.outputs.frontend == 'true' &&
      (needs.deploy-infra.result == 'success' || needs.deploy-infra.result == 'skipped')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build Vue application
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      # Each job performs its own OIDC login for intentional isolation.
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          output_location: dist
          skip_app_build: true
