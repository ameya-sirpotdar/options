name: Deploy Infrastructure and Applications

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AZURE_RESOURCE_GROUP: rg-production
  AZURE_LOCATION: eastus

jobs:
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            infra:
              - 'infra/bicep/**'
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  deploy-infra:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.infra == 'true'
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Azure Login (OIDC)
        uses: azure/login@6c251865b4e6290e7b78be643ea2d005bc51f69a # v2.1.1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep template
        uses: azure/arm-deploy@a1361c2781ae3132db7a0f4a4b4d5c8a2e7e8e8e # v2.0.0
        with:
          scope: subscription
          region: ${{ env.AZURE_LOCATION }}
          template: infra/bicep/main.bicep
          parameters: location=${{ env.AZURE_LOCATION }}
          deploymentName: gh-${{ github.run_id }}-${{ github.run_attempt }}
          failOnStdErr: true

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: [changes, deploy-infra]
    # always() prevents GitHub from auto-skipping this job when deploy-infra is skipped
    # (e.g. no infra changes). The explicit result checks then gate on actual outcomes.
    # 'cancelled' is excluded explicitly so a cancelled infra run causes a hard failure
    # rather than a silent skip.
    if: |
      always() &&
      needs.changes.outputs.backend == 'true' &&
      (needs.deploy-infra.result == 'success' || needs.deploy-infra.result == 'skipped') &&
      needs.deploy-infra.result != 'cancelled'
    environment: production
    env:
      ACR_NAME: ${{ secrets.ACR_NAME }}
      AKS_CLUSTER_NAME: ${{ secrets.AKS_CLUSTER_NAME }}
      K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE || 'production' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Validate required secrets
        run: |
          missing=0
          for var in ACR_NAME AKS_CLUSTER_NAME; do
            if [ -z "${!var}" ]; then
              echo "ERROR: Required secret/variable $var is not set"
              missing=1
            fi
          done
          [ $missing -eq 0 ] || exit 1

      # Each job performs its own OIDC login for intentional isolation.
      - name: Azure Login (OIDC)
        uses: azure/login@6c251865b4e6290e7b78be643ea2d005bc51f69a # v2.1.1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3.7.1

      - name: Build and push backend Docker image
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v5.4.0
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_NAME }}.azurecr.io/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set AKS context
        uses: azure/aks-set-context@37ad5d6c867c5a5cc2e9b8e3a6a7e7b4e8e8e8e8 # v3.0.0
        with:
          resource-group: ${{ env.AZURE_RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER_NAME }}

      - name: Substitute image tag in Kubernetes manifests
        env:
          IMAGE_TAG: ${{ github.sha }}
          ACR_NAME: ${{ env.ACR_NAME }}
        run: |
          # Capture file list once to ensure consistency across check and substitution.
          # Manifests must use __IMAGE_TAG__ and __ACR_NAME__ as delimited placeholders
          # (e.g. image: __ACR_NAME__.azurecr.io/backend:__IMAGE_TAG__) to avoid
          # accidental substitution in comments or unrelated config values.
          MANIFESTS=$(find infra/k8s/backend -name '*.yaml' -o -name '*.yml')
          if ! echo "$MANIFESTS" | xargs grep -ql '__IMAGE_TAG__\|__ACR_NAME__'; then
            echo "ERROR: No placeholders found in manifests" && exit 1
          fi
          echo "$MANIFESTS" | xargs sed -i \
            -e "s|__IMAGE_TAG__|${IMAGE_TAG}|g" \
            -e "s|__ACR_NAME__|${ACR_NAME}|g"

      - name: Validate Kubernetes manifests (dry-run)
        run: kubectl apply -f infra/k8s/backend/ --dry-run=server

      - name: Apply Kubernetes manifests
        run: kubectl apply -f infra/k8s/backend/ --server-side

      - name: Wait for rollout to complete
        env:
          DEPLOYMENT_NAME: ${{ vars.BACKEND_DEPLOYMENT_NAME || 'backend' }}
        run: |
          kubectl rollout status deployment/${DEPLOYMENT_NAME} \
            -n ${{ env.K8S_NAMESPACE }} --timeout=5m

      - name: Rollback on failure
        if: failure()
        run: |
          kubectl rollout undo deployment/${{ vars.BACKEND_DEPLOYMENT_NAME || 'backend' }} \
            -n ${{ env.K8S_NAMESPACE }}

      - name: Smoke test backend
        run: |
          BACKEND_URL=$(kubectl get svc backend -n ${{ env.K8S_NAMESPACE }} -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          if [ -z "$BACKEND_URL" ]; then
            echo "ERROR: LoadBalancer IP not yet assigned" && exit 1
          fi
          curl --fail --retry 5 --retry-delay 5 --max-time 10 "https://${BACKEND_URL}/health"

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    # deploy-backend and deploy-frontend both depend only on deploy-infra (not each other),
    # so they run in parallel once infra completes. This is intentional.
    needs: [changes, deploy-infra]
    if: |
      always() &&
      needs.changes.outputs.frontend == 'true' &&
      (needs.deploy-infra.result == 'success' || needs.deploy-infra.result == 'skipped') &&
      needs.deploy-infra.result != 'cancelled'
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Validate build environment
        run: |
          if [ -z "${{ vars.VITE_API_BASE_URL }}" ]; then
            echo "ERROR: VITE_API_BASE_URL is not set" && exit 1
          fi

      - name: Build Vue application
        working-directory: ./frontend
        run: npm run build
        env:
          # VITE_API_BASE_URL is not a secret — it is a non-sensitive build-time config value.
          # It is stored as a GitHub Actions variable (vars.*) rather than a secret so it
          # is not masked in logs and its non-sensitive nature is explicit.
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      # Each job performs its own OIDC login for intentional isolation.
      - name: Azure Login (OIDC)
        uses: azure/login@6c251865b4e6290e7b78be643ea2d005bc51f69a # v2.1.1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1.5.0
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /
          output_location: frontend/dist
          skip_app_build: true
