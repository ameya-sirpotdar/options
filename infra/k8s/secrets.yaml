# This manifest is intentionally NOT committed with real secret values.
# The CI/CD workflow (deploy.yml) creates this secret imperatively via
# `kubectl create secret generic` using values from GitHub Secrets.
# This file documents the expected structure only.
#
# Provisioned by deploy-backend job in .github/workflows/deploy.yml.
apiVersion: v1
kind: Secret
metadata:
  name: options-backend-secrets
type: Opaque
stringData:
  azure-storage-connection-string: "__AZURE_STORAGE_CONNECTION_STRING__"
  key-vault-url: "__KEY_VAULT_URL__"
