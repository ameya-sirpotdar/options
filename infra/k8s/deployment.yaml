apiVersion: apps/v1
kind: Deployment
metadata:
  name: options-backend
  labels:
    app: options-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: options-backend
  template:
    metadata:
      labels:
        app: options-backend
    spec:
      containers:
        - name: options-backend
          image: __ACR_NAME__.azurecr.io/backend:__IMAGE_TAG__
          ports:
            - containerPort: 8000
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: AZURE_STORAGE_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: options-backend-secrets
                  key: azure-storage-connection-string
            - name: KEY_VAULT_URL
              valueFrom:
                secretKeyRef:
                  name: options-backend-secrets
                  key: key-vault-url
            - name: ALLOWED_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: options-backend-secrets
                  key: allowed-origins
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"